name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install mkdocs-material mkdocs-macros-plugin pyyaml

      - name: Generate docs
        working-directory: scripts
        run: python3 autogen.py docs

      - name: Build site
        working-directory: scripts
        run: mkdocs build --strict --site-dir ../site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-docs:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
