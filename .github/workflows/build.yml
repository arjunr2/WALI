name: Build

on:
  workflow_call:

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runs-on: ubuntu-latest
          - arch: aarch64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install dependencies
        run: sudo ./install-deps.sh

      - name: Run quick setup (toolchains, runtime, compiler, libc)
        run: ./quick_setup.sh

      - name: Build tests
        run: make -C tests

      - name: Upload iwasm
        uses: actions/upload-artifact@v4
        with:
          name: iwasm-${{ matrix.arch }}
          path: build/wamr/iwasm/iwasm
          retention-days: 1

      - name: Upload tests bin
        uses: actions/upload-artifact@v4
        with:
          name: tests-bin-${{ matrix.arch }}
          path: tests/bin/
          retention-days: 1
