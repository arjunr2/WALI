name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-matrix:
    uses: ./.github/workflows/build.yml

  build:
    needs: build-matrix
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.build-matrix.result }}" != "success" ]; then
            exit 1
          fi

  unit-tests-matrix:
    needs: build-matrix
    strategy:
      matrix:
        include:
          - arch: x86_64
            runs-on: ubuntu-latest
          - arch: aarch64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download iwasm
        uses: actions/download-artifact@v4
        with:
          name: iwasm-${{ matrix.arch }}
          path: build/wamr/iwasm/

      - name: Download tests bin
        uses: actions/download-artifact@v4
        with:
          name: tests-bin-${{ matrix.arch }}
          path: tests/bin/

      - name: Restore iwasm symlink and permissions
        run: |
          chmod +x build/wamr/iwasm/iwasm
          find tests/bin -type f -exec chmod +x {} +
          ln -sf "$PWD/build/wamr/iwasm/iwasm" iwasm

      - name: Run tests
        run: cd tests && python3 run_tests.py

  unit-tests:
    needs: unit-tests-matrix
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.unit-tests-matrix.result }}" != "success" ]; then
            exit 1
          fi

  precompiled-tests-matrix:
    needs: build-matrix
    strategy:
      matrix:
        include:
          - arch: x86_64
            runs-on: ubuntu-latest
          - arch: aarch64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    env:
      IWASM: ${{ github.workspace }}/build/wamr/iwasm/iwasm --stack-size=4194304
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download iwasm
        uses: actions/download-artifact@v4
        with:
          name: iwasm-${{ matrix.arch }}
          path: build/wamr/iwasm/

      - name: Restore iwasm permissions
        run: chmod +x build/wamr/iwasm/iwasm

      - name: Test bash
        working-directory: examples/precompiled/bash
        run: |
          out=$($IWASM bash.wasm test.sh)
          echo "$out"
          echo "$out" | grep -q "Hello from WALI bash"
          echo "$out" | grep -q "sum: 6"
          echo "$out" | grep -q "read back: wali-bash-payload"

      - name: Test lua
        working-directory: examples/precompiled/lua
        run: |
          out=$($IWASM lua.wasm test.lua)
          echo "$out"
          echo "$out" | grep -q "Hello from WALI lua"
          echo "$out" | grep -q "sum(10):.*55"
          echo "$out" | grep -q "fact(5):.*120"

      - name: Test sqlite
        working-directory: examples/precompiled/sqlite
        run: |
          out=$($IWASM sqlite3.wasm chinook.db ".read list_albums.sql")
          echo "$out"
          echo "$out" | grep -q "Ace Of Spades"

      - name: Test vim
        working-directory: examples/precompiled
        run: |
          $IWASM vim.wasm -n -u NONE -es -c "put! ='Hello from CI'" -c "wq" /tmp/vim_testfile.txt
          grep -q "Hello from CI" /tmp/vim_testfile.txt

  precompiled-tests:
    needs: precompiled-tests-matrix
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.precompiled-tests-matrix.result }}" != "success" ]; then
            exit 1
          fi
